*{ box-sizing:border-box; }
html{ scroll-behavior:smooth; scrollbar-width:none; -ms-overflow-style:none; }
html::-webkit-scrollbar{ display:none; }
body{ margin:0; background:var(--bg); color:var(--ink);
  font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;
  line-height:1.9; -webkit-font-smoothing:antialiased; }
@media (prefers-reduced-motion: reduce){ *{ animation:none !important; scroll-behavior:auto; } }
a{ color:inherit; }
.logo{ font-family:"Zen Antique Logo","Hiragino Mincho ProN","Yu Mincho",serif; font-weight:400; letter-spacing:-.09em; }
.logo .u{ position:relative; }
.logo .spk{ position:absolute; width:.46em; height:.46em; top:.26em; right:-.12em;
  filter:drop-shadow(0 0 4px rgba(130,150,240,.5)); }

/* サイト本体：夜明けの6色段階グラデーション（ストーリーページと共通）。ヒーロー以下を包む */
.flow{ position:relative; overflow:hidden; background:linear-gradient(180deg,
  #0b131e 0%, #0e1f4c 20%, #1d4068 40%, #242223 60%, #372210 80%, #4a320f 100%); }
.feature-page .flow{ min-height:100svh; }
/* 背景演出：同心円スタートレイル（固定・右上を極）＋ 視差する星粒子（ストーリーページと共通） */
.flow-bg{ position:fixed; inset:0; z-index:0; pointer-events:none; }
.flow > *:not(.flow-bg){ position:relative; z-index:1; }
#trailCanvas{ position:absolute; inset:0; width:100%; height:100%; opacity:.55; }
.stars{ position:absolute; inset:-20% -10% -10% -10%; }
.stars i{ position:absolute; display:block; width:2px; height:2px; border-radius:50%;
  background:#fff; opacity:.5; }
.stars i.gold{ background:var(--gold); }
.stars i.spark{ width:auto !important; height:auto !important; background:none; border-radius:0;
  font-size:10px; line-height:1; color:#fff; text-shadow:0 0 4px rgba(130,150,240,.5); }
.stars i.spark.gold{ background:none; color:var(--gold); text-shadow:0 0 5px rgba(232,201,135,.5); }
/* ── 透明→すりガラスのトップバー ── */
.topbar{ position:fixed; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding:8px clamp(20px,5vw,64px);
  background:rgba(12,16,32,0); border-bottom:1px solid rgba(255,255,255,0);
  backdrop-filter:blur(0) saturate(1); -webkit-backdrop-filter:blur(0) saturate(1);
  opacity:0; pointer-events:none;
  transition:opacity .38s ease, background .38s ease .22s, border-color .38s ease .22s, backdrop-filter .38s ease .22s, -webkit-backdrop-filter .38s ease .22s; }
.topbar.show{ background:rgba(12,16,32,.56); border-bottom-color:rgba(255,255,255,.06);
  backdrop-filter:blur(18px) saturate(1.3); -webkit-backdrop-filter:blur(18px) saturate(1.3); opacity:1; pointer-events:auto; }
.topbar.hiding{ background:rgba(12,16,32,0); border-bottom-color:rgba(255,255,255,0);
  backdrop-filter:blur(0) saturate(1); -webkit-backdrop-filter:blur(0) saturate(1);
  transition:background .38s ease, border-color .38s ease, backdrop-filter .38s ease, -webkit-backdrop-filter .38s ease; }
.topbar .logo{ font-size:1.575rem; color:#fff; }
.topbar .links{ display:flex; align-items:center; gap:clamp(14px,2vw,30px); }
.topbar .links a{ font-size:.8rem; color:#dfe3ee; text-decoration:none; opacity:.85; transition:opacity .2s; }
.topbar .links a:hover{ opacity:1; }
.spark-menu{ display:grid; place-items:center; width:42px; height:42px; margin-left:2px; padding:0;
  border:0; color:#fff; cursor:pointer; background:transparent; transition:transform .25s ease; }
.spark-menu:hover{ transform:rotate(12deg) scale(1.12); }
.spark-menu:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }
.spark-menu svg{ width:25px; height:25px; filter:drop-shadow(0 0 5px rgba(255,255,255,.82)); }
.menu-layer{ position:fixed; inset:0; z-index:30; display:flex; justify-content:center; pointer-events:none; opacity:0; transition:none; }
.menu-layer.open, .menu-layer.closing{ opacity:1; }
.menu-layer.open{ pointer-events:auto; }
.menu-scrim{ position:absolute; inset:0; background:rgba(4,8,18,0); backdrop-filter:blur(0); -webkit-backdrop-filter:blur(0);
  transition:background .38s ease, backdrop-filter .38s ease, -webkit-backdrop-filter .38s ease; }
.menu-panel{ position:relative; width:min(520px,calc(100% - 40px)); height:100%; overflow:auto; padding:32px clamp(24px,5vw,42px) 44px;
  color:#edf0f8; background:transparent; border:0; box-shadow:none; opacity:0; transition:opacity .28s ease;
  -ms-overflow-style:none; scrollbar-width:none; }
.menu-panel::-webkit-scrollbar{ width:0; height:0; }
.menu-layer.open .menu-scrim{ background:rgba(4,8,18,.42); backdrop-filter:blur(18px) saturate(1.12); -webkit-backdrop-filter:blur(18px) saturate(1.12); }
.menu-layer.open .menu-panel{ opacity:1; transition-delay:.12s; }
.menu-layer.closing .menu-panel{ opacity:0; transition-delay:0s; }
.menu-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
.menu-title{ margin:0; font-family:inherit; font-size:1.3rem; font-weight:700; letter-spacing:.04em; }
.menu-close{ position:fixed; top:8px; right:clamp(20px,5vw,64px); z-index:1; display:grid; place-items:center; width:42px; height:42px; padding:0; border:0; color:#eef1fb; background:transparent; cursor:pointer;
  transition:transform .25s ease, filter .25s ease; }
.menu-close svg{ width:25px; height:25px; filter:drop-shadow(0 0 4px rgba(255,255,255,.52)); }
.menu-close path{ fill:none; stroke:currentColor; stroke-width:3.2; stroke-linecap:round; }
.menu-close:hover{ transform:rotate(12deg) scale(1.12); filter:drop-shadow(0 0 8px rgba(240,167,90,.6)); }
.menu-close:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }
.menu-group + .menu-group{ margin-top:31px; padding-top:27px; border-top:1px solid rgba(255,255,255,.13); }
.menu-label{ margin:0 0 12px; color:#b8c4e2; font-size:.69rem; font-weight:700; letter-spacing:.16em; }
.menu-group a{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 0; color:#f3f5fa; font-size:1rem; text-decoration:none; border-bottom:1px solid rgba(255,255,255,.07); }
.menu-group a::after{ content:"→"; color:var(--gold); opacity:.75; transition:transform .2s ease; }
.menu-group a:hover::after{ transform:translateX(4px); }
body.menu-open{ overflow:hidden; }

.btn{ display:inline-block; padding:9px 20px; border-radius:999px; font-size:.8rem; font-weight:700;
  text-decoration:none; color:var(--gold-ink); background:var(--gold);
  box-shadow:0 4px 18px rgba(0,0,0,.35); white-space:nowrap; }
.btn.ghost{ background:transparent; color:#e7ebf4; border:1px solid rgba(255,255,255,.35); box-shadow:none; }
/* Google Playボタン＝夜明けグラデーション（濃紺→琥珀）。文字は白でどちらの地色でも読める */
.btn.dawn{ background:linear-gradient(115deg,#3a4a8f 0%,#8a6a6f 55%,#e08a3e 100%); color:#fff; }

/* ── footer ── */
footer{ border-top:1px solid var(--line); padding:48px clamp(20px,5vw,64px); }
.foot-in{ max-width:1120px; margin:0 auto; display:flex; justify-content:space-between; flex-wrap:wrap; gap:24px; }
footer .logo{ color:#fff; font-size:1.05rem; }
footer nav.f{ position:static; padding:0; display:flex; gap:26px; flex-wrap:wrap; }
footer .f a{ font-size:.8rem; color:var(--muted); text-decoration:none; }
footer .f a:hover{ color:var(--ink); }
footer .copy{ width:100%; font-size:.7rem; color:#586074; margin-top:8px; }

/* ── tablet ── */
@media (max-width:900px){
  .topbar .links a:not(.btn){ display:none; }
  .topbar .links .btn{ display:none; }
}
/* ── phone ── */
</style>

    bar.classList.add('show');
  }
  function hideBar(){
    if(!bar.classList.contains('show') || bar.classList.contains('hiding')) return;
    bar.classList.add('hiding');
    hideTimer = setTimeout(function(){ bar.classList.remove('show','hiding'); }, 390);
  }
  function onScroll(){
    var trigger = hero ? hero.offsetHeight - 70 : 0;
    if(window.scrollY > trigger) showBar();
    else hideBar();
  }
  addEventListener('scroll', onScroll, {passive:true});
  addEventListener('resize', onScroll);
  onScroll();
})();

(function(){
  var openButton = document.getElementById('menuOpen');
  var menu = document.getElementById('siteMenu');
  var closeButtons = menu.querySelectorAll('[data-menu-close]');
  var menuLinks = menu.querySelectorAll('a');
  var closeTimer;
  function closeMenu(){
    if(!menu.classList.contains('open')) return;
    menu.classList.remove('open');
    menu.classList.add('closing');
    menu.setAttribute('aria-hidden','true');
    openButton.setAttribute('aria-expanded','false');
    document.body.classList.remove('menu-open');
    clearTimeout(closeTimer);
    closeTimer = setTimeout(function(){ menu.classList.remove('closing'); }, 390);
  }
  openButton.addEventListener('click', function(){
    if(menu.classList.contains('open')){
      closeMenu();
      return;
    }
    clearTimeout(closeTimer);
    menu.classList.remove('closing');
    menu.classList.add('open');
    menu.setAttribute('aria-hidden','false');
    openButton.setAttribute('aria-expanded','true');
    document.body.classList.add('menu-open');
  });
  for(var i=0;i<closeButtons.length;i++) closeButtons[i].addEventListener('click', closeMenu);
  for(var j=0;j<menuLinks.length;j++) menuLinks[j].addEventListener('click', closeMenu);
  addEventListener('keydown', function(event){ if(event.key === 'Escape') closeMenu(); });
})();

/* 同心円スタートレイル（右上を極・ゆっくり回転）。ストーリーページと共通の演出
   ── 負荷軽減（2026-07-20）：星数・セグメント数を削減（描画回数 約5,720→約1,000/フレーム）、
      DPR上限を下げ、タブが非表示のときは描画ループを止める */
(function(){
  var c = document.getElementById('trailCanvas');
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var dpr = Math.min(devicePixelRatio||1, 1.5);
  function size(){ c.width = innerWidth*dpr; c.height = innerHeight*dpr; }
  size(); addEventListener('resize', size);
  var ctx = c.getContext('2d');
  var N = 130;
  var stars = Array.from({length:N}, function(){
    var r = Math.pow(Math.random(), .7);
    return {
      rad: .05 + r*1.15, ang: Math.random()*Math.PI*2,
      size: Math.random()*1.4 + .5, bright: Math.random()*.6 + .3,
      gold: Math.random() < .16
    };
  });
  var SPEED = 0.00005;
  var raf = null;
  function frame(ts){
    var w=c.width, h=c.height, px=.86*w, py=.10*h, base=Math.max(w,h);
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<stars.length;i++){
      var s = stars[i];
      var a = s.ang + (reduced?0:ts*SPEED);
      var R = s.rad*base;
      var x = px+Math.cos(a)*R, y = py+Math.sin(a)*R;
      // 軌道を長く・末尾へ向けてフェード：円弧は線形グラデーションが使えないため、
      // 頭(a)→尾(a-sweep)を細かい弧のセグメントに分け、1本ずつアルファを下げて重ね描きする
      var sweep = 0.28 + s.bright*0.62;
      var segs = 10;
      var lw = s.size*2.4*dpr*.6;
      var baseCol = s.gold ? '232,201,135' : '205,214,255';
      for(var k=0;k<segs;k++){
        var t0 = k/segs, t1 = (k+1)/segs;
        var a0 = a - sweep*t1, a1 = a - sweep*t0; // 尾側(t=1)ほど極寄りの過去角
        var fade = Math.pow(1 - t1, 1.6); // 尾に向かって急に薄くなる
        ctx.beginPath(); ctx.arc(px,py,R, a0, a1);
        ctx.strokeStyle = 'rgba(' + baseCol + ',' + (fade*0.22) + ')';
        ctx.lineWidth = lw;
        ctx.stroke();
      }
      ctx.globalAlpha = s.bright*.85; ctx.fillStyle = s.gold ? '#e8c987' : '#dfe6ff';
      ctx.beginPath(); ctx.arc(x,y,s.size*dpr*.65,0,7); ctx.fill(); ctx.globalAlpha=1;
    }
    if(!reduced) raf = requestAnimationFrame(frame);
  }
  function start(){ if(raf==null) raf = requestAnimationFrame(frame); }
  function stop(){ if(raf!=null){ cancelAnimationFrame(raf); raf=null; } }
  document.addEventListener('visibilitychange', function(){
    if(document.hidden) stop(); else start();
  });
  start();
})();

/* スクロール視差の星粒子。個別レイヤー速度でスクロールと共にゆっくりズレて奥行きを出す */
(function(){
  var wrap = document.getElementById('stars');
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var layers = [
    {n:22, speed:.05, size:1.4, op:.35},
    {n:18, speed:.12, size:1.8, op:.5},
    {n:10, speed:.22, size:2.4, op:.65, gold:true}
  ];
  var items = [];
  layers.forEach(function(l){
    for(var i=0;i<l.n;i++){
      var el = document.createElement('i');
      var gold = l.gold && Math.random()<.5;
      if(gold) el.className = 'gold';
      var w = l.size, left = Math.random()*100, top = Math.random()*140-20;
      el.style.left = left+'%'; el.style.top = top+'%';
      el.style.width = w+'px'; el.style.height = w+'px'; el.style.opacity = l.op;
      wrap.appendChild(el);
      items.push({el:el, speed:l.speed, baseTop:top, gold:gold, size:l.size});
    }
  });
  // 全体からランダムに20個だけ、ロゴと同じ✦モチーフに差し替える（残りは点のまま）
  var sparkCount = Math.min(20, items.length);
  var pool = items.slice();
  for(var s=0; s<sparkCount; s++){
    var idx = Math.floor(Math.random()*pool.length);
    var it = pool.splice(idx,1)[0];
    it.el.classList.add('spark');
    it.el.textContent = '✦';
    it.el.style.fontSize = (it.size*7) + 'px';
  }
  if(reduced) return;
  function onScroll(){
    var y = window.scrollY;
    for(var i=0;i<items.length;i++){
      items[i].el.style.transform = 'translateY(' + (-y*items[i].speed) + 'px)';
    }
  }
  addEventListener('scroll', onScroll, {passive:true});
  onScroll();
})();
</script>
