  <style>@font-face{font-family:'Zen Antique Logo';src:url('assets/zen-antique-latin.woff2') format('woff2');font-display:swap}:root{--head:#f7f4ed;--text:#d6d9e0;--gold:#f1b951;--line:rgba(255,255,255,.16)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#0b131e;color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;letter-spacing:.035em}.flow{position:relative;min-height:100svh;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(180deg,#0b131e 0%,#0e1f4c 20%,#1d4068 40%,#242223 60%,#372210 80%,#4a320f 100%)}.flow-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}.stars{position:absolute;inset:0;background-image:radial-gradient(circle at 18% 16%,rgba(255,255,255,.9) 0 1px,transparent 1.8px),radial-gradient(circle at 72% 24%,rgba(255,255,255,.72) 0 1px,transparent 1.7px),radial-gradient(circle at 42% 68%,rgba(255,255,255,.72) 0 1px,transparent 1.6px),radial-gradient(circle at 85% 79%,rgba(255,255,255,.8) 0 1px,transparent 1.7px);opacity:.7}#trailCanvas{position:absolute;inset:0;width:100%;height:100%;opacity:.38}.topbar{position:fixed;z-index:20;inset:0 0 auto;height:76px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(18px,4vw,58px);opacity:0;pointer-events:none;transition:opacity .42s ease,backdrop-filter .7s ease,background-color .7s ease;background-color:rgba(7,12,24,0);backdrop-filter:blur(0)}.topbar.is-visible{opacity:1;pointer-events:auto;background-color:rgba(7,12,24,.22);backdrop-filter:blur(18px)}.miru-logo{color:var(--head);font-family:'Zen Antique Logo',serif;font-size:1.42rem;font-weight:400;letter-spacing:.08em;text-decoration:none}.sparkle-button,.menu-close{display:grid;place-items:center;width:44px;height:44px;border:0;background:transparent;color:#fff;cursor:pointer}.sparkle-button svg,.menu-close svg{width:31px;height:31px;fill:currentColor;filter:drop-shadow(0 0 8px rgba(255,255,255,.32))}.menu-layer{position:fixed;z-index:30;inset:0;display:grid;place-items:center;padding:24px;background:rgba(3,7,15,0);backdrop-filter:blur(0);opacity:0;pointer-events:none;transition:opacity .34s ease,background-color .5s ease,backdrop-filter .5s ease}.menu-layer.is-open{opacity:1;pointer-events:auto;background:rgba(3,7,15,.45);backdrop-filter:blur(20px)}.menu-panel{width:min(560px,100%);max-height:calc(100svh - 48px);padding:28px 28px 32px;overflow:auto;scrollbar-width:none;text-align:center;transform:translateY(10px);opacity:0;transition:opacity .28s ease .1s,transform .34s ease .1s}.menu-panel::-webkit-scrollbar{display:none}.menu-layer.is-open .menu-panel{transform:translateY(0);opacity:1}.menu-close{position:fixed;top:16px;right:clamp(18px,4vw,58px)}.menu-eyebrow{margin:0 0 24px;color:var(--gold);font-family:'Zen Antique Logo',serif;font-size:.8rem;letter-spacing:.14em}.menu-nav{display:grid;gap:8px}.menu-nav a{padding:12px;color:var(--head);font-size:clamp(1.05rem,2.5vw,1.35rem);text-decoration:none}.menu-nav a:hover{color:var(--gold)}.menu-support{margin:30px 0 0;padding-top:20px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;justify-content:center;gap:8px 18px}.menu-support a{color:#c5cad4;font-size:.78rem;text-decoration:none}.legal-empty{position:relative;z-index:1;flex:1 1 auto;min-height:clamp(320px,60vh,720px)}.page-store{position:relative;z-index:1;display:flex;justify-content:center;padding:clamp(54px,10vh,96px) 24px clamp(42px,8vh,72px)}.page-store-link{display:block;line-height:0;border-radius:28%;transition:transform .25s ease,filter .25s ease}.page-store-link:hover{transform:translateY(-5px) scale(1.04);filter:drop-shadow(0 12px 18px rgba(241,185,81,.28))}.page-store-icon{width:clamp(76px,10vw,108px);height:auto;border-radius:28%}.footer{position:relative;z-index:1;padding:30px clamp(20px,5vw,72px) 38px;border-top:1px solid var(--line);background:linear-gradient(180deg,rgba(74,50,15,.08),rgba(43,27,10,.35))}.footer-brand{display:flex;align-items:baseline;gap:15px;color:var(--head)}.footer-miru{font-family:'Zen Antique Logo',serif;font-size:1.5rem;letter-spacing:.08em}.footer-tagline{color:#e0bf7b;font-family:'Zen Antique Logo',serif;font-size:.72rem;letter-spacing:.08em}.footer-bottom{display:flex;justify-content:space-between;gap:18px;margin-top:24px;color:#aeb4bf;font-size:.72rem}.footer-bottom a{color:inherit;text-decoration:none}@media(max-width:640px){.topbar{height:66px}.menu-close{top:11px}.footer-brand,.footer-bottom{align-items:flex-start;flex-direction:column;gap:7px}.legal-empty{min-height:48svh}}</style>
</head>
<body>
  <header class="topbar" id="topbar"><a class="miru-logo" href="index.html" aria-label="Miru トップページ">Miru</a><button class="sparkle-button" id="menuButton" type="button" aria-label="メニューを開く" aria-expanded="false"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16 1.5c1.6 9 4.5 12 13.5 13.5C20.5 16.5 17.6 19.5 16 30.5 14.4 19.5 11.5 16.5 2.5 15 11.5 13.5 14.4 10.5 16 1.5Z"/></svg></button></header>
  <aside class="menu-layer" id="siteMenu" aria-hidden="true"><button class="menu-close" id="menuClose" type="button" aria-label="メニューを閉じる"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M7 5.6 26.4 25 25 26.4 5.6 7 7 5.6Zm19.4 0L7 25 5.6 23.6 25 4.2l1.4 1.4Z"/></svg></button><div class="menu-panel"><p class="menu-eyebrow">Contents</p><nav class="menu-nav" aria-label="サイト内メニュー"><a href="index.html">トップページ</a><a href="why.html">なぜこの機能があるのか</a><a href="evidence.html">エビデンスライブラリ</a><a href="features.html">機能紹介</a><a href="faq.html">FAQ</a></nav><div class="menu-support"><a href="privacy.html">プライバシーポリシー</a><a href="terms.html">利用規約</a><a href="tokushouhou.html">特定商取引法に基づく表記</a></div></div></aside>
  <main class="legal-page" id="top" aria-label="特定商取引法に基づく表記"><div class="flow"><div class="flow-bg"><canvas id="trailCanvas"></canvas><div class="stars"></div></div><section class="legal-empty" id="legal-content" aria-label="特定商取引法に基づく表記の本文"></section><section class="page-store" aria-label="Miruを入手"><a class="page-store-link" href="#" onclick="return false" aria-label="Google PlayでMiruを入手"><img class="page-store-icon" src="../../app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" alt="Miruアプリアイコン"></a></section><footer class="footer"><div class="footer-brand"><span class="footer-miru">Miru</span><span class="footer-tagline">Think freely. See clearly.</span></div><div class="footer-bottom"><span>© Miru</span><a href="mailto:contact@miru-app.com">お問い合わせ</a></div></footer></div></main>
  <script>(function(){var bar=document.getElementById('topbar'),button=document.getElementById('menuButton'),layer=document.getElementById('siteMenu'),close=document.getElementById('menuClose');function menu(open){layer.classList.toggle('is-open',open);layer.setAttribute('aria-hidden',String(!open));button.setAttribute('aria-expanded',String(open));document.body.style.overflow=open?'hidden':''}addEventListener('scroll',function(){bar.classList.toggle('is-visible',scrollY>32)},{passive:true});bar.classList.toggle('is-visible',scrollY>32);button.addEventListener('click',function(){menu(true)});close.addEventListener('click',function(){menu(false)});layer.addEventListener('click',function(e){if(e.target===layer)menu(false)});addEventListener('keydown',function(e){if(e.key==='Escape')menu(false)});var canvas=document.getElementById('trailCanvas'),ctx=canvas.getContext('2d'),stars=[];function resize(){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);stars=Array.from({length:55},function(){return{x:Math.random()*innerWidth,y:Math.random()*innerHeight,a:Math.random()*.7+.15}})}function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);stars.forEach(function(s){ctx.fillStyle='rgba(255,255,255,'+s.a+')';ctx.fillRect(s.x,s.y,1,1)});requestAnimationFrame(draw)}resize();addEventListener('resize',resize);draw()})();</script>
</body>
